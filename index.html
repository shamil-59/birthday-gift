<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&display=swap" rel="stylesheet">
    </head>
    <body>
        <div id="header">
            <h1 class="happy-monkey-regular">Today is Fatima's birthday 🎉</h1>
            <img id="img" src="./images/54.jpg">
            <h2 id="bd-age" class="happy-monkey-regular">20 years old</h2>
            <h4 id="bd-date" class="happy-monkey-regular">25.08.2025</h4>
        </div>
        <div id="gift-section">
            <h2 class="gift-title happy-monkey-regular">Here is how happy I am for you today!!! 🥳</h2>
            <h3 class="gift-hint happy-monkey-regular">(Hover over the gift!)</h3>
            <div class="gift-img" id="gift-img-happy"></div>
        </div>
        <div id="gift-hot">
            <h2 class="gift-title happy-monkey-regular">How people react when you enter the room 😍</h2>
            <div class="gift-img" id="gift-img-hot"></div>
        </div>
        <div id="gift-cheers">
            <h2 class="gift-title happy-monkey-regular">This one's for <em>you,</em> my friend 🥂</h2>
            <div class="gift-img" id="gift-img-cheers"></div>
        </div>
            <p id="footer" class="gift-title happy-monkey-regular">
                If you want to create your own Birthday GIFt site, take
                <a href="https://scrimba.com/learn-html-and-css-c0p/~033" target="_blank">this HTML & CSS course.</a>
            </p>
    </body>
</html>
